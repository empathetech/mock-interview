<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Interview Portfolio</title>
  <script src="/shell/theme.js"></script>
  <link rel="stylesheet" href="/shell/shell.css">
  <style>
    body { display:block; overflow:auto; }
    .pf-wrap { max-width:980px; margin:0 auto; padding:28px 20px 60px; }
    .pf-topbar { display:flex; align-items:center; gap:10px; margin-bottom:6px; }
    .pf-brand { width:34px; height:34px; border-radius:9px;
      background:linear-gradient(135deg, var(--ee-deep-purple), var(--ee-bright-purple), var(--ee-sunset)); flex:0 0 auto; }
    .pf-head { display:flex; align-items:baseline; gap:14px; flex-wrap:wrap; }
    .pf-head h1 { font-size:22px; font-weight:600; margin:0; }
    .pf-head .pf-who { color:var(--muted); font-size:14px; }
    .pf-controls { display:flex; gap:10px; margin:18px 0; flex-wrap:wrap; }
    .pf-controls input, .pf-controls select { font:inherit; font-size:14px; padding:7px 10px;
      border:1px solid var(--line); border-radius:8px; background:var(--panel); color:var(--ink); }
    .pf-controls option { background:var(--panel); color:var(--ink); }
    .pf-controls input[type=text], .pf-controls #pf-search { flex:1; min-width:200px; }
    .pf-ft { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--muted); white-space:nowrap; cursor:pointer; }
    .pf-ft-status { color:var(--warn); font-size:12px; }
    /* Scroll wrapper keeps the table exactly as wide as the controls above it (the 980px wrap),
       centered, so nothing peeks out; it only scrolls on viewports too narrow for the columns. */
    .pf-tablewrap { width:100%; overflow-x:auto; border-radius:10px; }
    table { width:100%; table-layout:fixed; border-collapse:collapse; background:var(--panel);
      border:1px solid var(--line); border-radius:10px; overflow:hidden; }
    /* Five columns only (sum = 100%). Level + Date + the specific job title collapse into the Role and
       Status tooltips, Result is folded into Status, and Actions is a single ⋯ menu — so every column is
       wide enough that its content never truncates awkwardly. */
    col.c-interview { width:34%; } col.c-company { width:19%; } col.c-role { width:17%; }
    col.c-status { width:18%; } col.c-actions { width:12%; }
    th, td { text-align:left; padding:10px 12px; border-bottom:1px solid var(--line); font-size:14px;
      vertical-align:middle; overflow:hidden; text-overflow:ellipsis; }
    th { font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); background:var(--bg); cursor:pointer; }
    tr:last-child td { border-bottom:0; }
    tr:hover td { background:var(--panel-2); }
    a.pf-open { color:var(--accent); font-weight:600; text-decoration:none; display:inline-block;
      max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; vertical-align:bottom; }
    a.pf-open:hover { text-decoration:underline; }
    .pf-pill { display:inline-block; max-width:100%; font-size:11px; padding:2px 9px; border-radius:999px;
      border:1px solid var(--line); color:var(--muted); white-space:nowrap; vertical-align:middle;
      overflow:hidden; text-overflow:ellipsis; }
    /* In-progress states: outline pills. */
    .pf-pill.in_progress { color:var(--warn); border-color:var(--warn); }
    .pf-pill.ended { color:var(--warn); border-color:var(--warn); background:var(--accent-soft); }
    .pf-pill.not_started { color:var(--muted); }
    /* Terminal states: SOLID, high-contrast pills (Result is folded into Status here — a completed
       interview shows pass / borderline / fail, or plain "completed" when no result was recorded). */
    .pf-pill.completed { color:var(--accent-ink); background:var(--accent); border-color:var(--accent); font-weight:600; }
    .pf-pill.pass { color:var(--success-ink); background:var(--success); border-color:var(--success); font-weight:600; }
    .pf-pill.fail { color:var(--danger-ink); background:var(--danger); border-color:var(--danger); font-weight:600; }
    .pf-pill.borderline { color:var(--warn-ink); background:var(--warn); border-color:var(--warn); font-weight:600; }
    .pf-pill.none { color:var(--muted); border-style:dashed; }
    /* Neutral metadata tags: company / role / level / date — scannable, not free-form */
    .pf-tag { display:inline-block; font-size:12px; padding:2px 9px; border-radius:999px; background:var(--bg);
      border:1px solid var(--line); color:var(--ink); white-space:nowrap; max-width:220px; overflow:hidden;
      text-overflow:ellipsis; vertical-align:middle; }
    .pf-tag.muted { color:var(--muted); }
    .pf-empty { color:var(--muted); padding:24px; text-align:center; }
    footer { margin-top:22px; font-size:12px; color:var(--muted); }
    /* candidate profile links + edit */
    .pf-links { display:inline-flex; gap:10px; font-size:13px; }
    .pf-links a { color:var(--accent); text-decoration:none; }
    .pf-links a:hover { text-decoration:underline; }
    /* per-interview row actions — a single ⋯ trigger that opens a dropdown menu */
    th.pf-actions-h { text-align:right; cursor:default; }
    td.pf-actions { white-space:nowrap; text-align:right; }
    .pf-act { background:none; border:1px solid var(--line); border-radius:6px; padding:3px 6px;
      cursor:pointer; color:var(--muted); font:inherit; font-size:13px; line-height:1.1; }
    .pf-act:hover { color:var(--ink); border-color:var(--accent); }
    .pf-act.danger:hover { color:var(--danger); border-color:var(--danger); }
    .pf-more { font-size:17px; line-height:1; padding:1px 9px; letter-spacing:1px; }
    .pf-more[aria-expanded="true"] { color:var(--ink); border-color:var(--accent); background:var(--accent-soft); }
    /* Row-action dropdown (positioned in JS, anchored to the ⋯ button). */
    .pf-menu { position:fixed; z-index:55; min-width:178px; padding:5px; background:var(--panel);
      border:1px solid var(--line); border-radius:10px; box-shadow:0 14px 36px rgba(0,0,0,.30); }
    .pf-menu button { display:flex; align-items:center; gap:10px; width:100%; text-align:left;
      background:none; border:0; border-radius:7px; padding:8px 10px; font:inherit; font-size:13.5px;
      color:var(--ink); cursor:pointer; }
    .pf-menu button:hover, .pf-menu button:focus-visible { background:var(--panel-2); outline:none; }
    .pf-menu button .pf-mi { width:16px; text-align:center; color:var(--muted); flex:0 0 auto; }
    .pf-menu button.danger { color:var(--danger); }
    .pf-menu button.danger .pf-mi { color:var(--danger); }
    .pf-menu-sep { height:1px; background:var(--line); margin:4px 4px; }
    /* Rich hover popover for Role / Status — same surface as the menu; key/value rows. */
    .pf-pop-cell { cursor:default; }
    .pf-pop { position:fixed; z-index:54; min-width:172px; max-width:300px; padding:6px 4px;
      background:var(--panel); border:1px solid var(--line); border-radius:10px;
      box-shadow:0 14px 36px rgba(0,0,0,.30); pointer-events:none; }
    .pf-pop-row { display:flex; align-items:baseline; justify-content:space-between; gap:20px;
      padding:5px 9px; font-size:12.5px; }
    .pf-pop-row + .pf-pop-row { border-top:1px solid var(--line); }
    .pf-pop-k { font-weight:700; color:var(--muted); text-align:left; white-space:nowrap; flex:0 0 auto; }
    .pf-pop-v { color:var(--ink); text-align:right; }
    /* lightweight modal + toast */
    .pf-overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); display:flex; align-items:center;
      justify-content:center; z-index:50; padding:16px; }
    .pf-modal { background:var(--panel); color:var(--ink); border:1px solid var(--line); border-radius:12px;
      padding:20px 22px; width:min(460px,94vw); max-height:90vh; overflow:auto; box-shadow:0 14px 44px rgba(0,0,0,.34); }
    .pf-modal h2 { margin:0 0 14px; font-size:17px; font-weight:600; }
    .pf-field { display:flex; flex-direction:column; gap:4px; margin-bottom:12px; }
    .pf-field label { font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); }
    .pf-field input, .pf-field select { font:inherit; font-size:14px; padding:7px 9px;
      border:1px solid var(--line); border-radius:8px; background:var(--bg); color:var(--ink); }
    .pf-field option { background:var(--panel); color:var(--ink); }
    .pf-note { font-size:12px; color:var(--muted); margin:-6px 0 12px; }
    .pf-note.warn { color:var(--warn); }
    .pf-modal-foot { display:flex; justify-content:flex-end; gap:10px; margin-top:6px; }
    .pf-toast { position:fixed; bottom:22px; left:50%; transform:translateX(-50%); background:var(--panel);
      color:var(--ink); border:1px solid var(--line); border-radius:8px; padding:10px 16px; font-size:14px;
      box-shadow:0 8px 26px rgba(0,0,0,.28); z-index:60; }
  </style>
</head>
<body>
  <div class="pf-wrap">
    <div class="pf-topbar">
      <div class="pf-brand" aria-hidden="true"></div>
      <div class="pf-head">
        <h1>Interview Portfolio</h1>
        <span class="pf-who" id="pf-who"></span>
        <span class="pf-links" id="pf-links"></span>
        <button class="pf-act" id="pf-editprofile" title="Edit your profile" hidden>✎ Profile</button>
      </div>
      <span class="mi-spacer"></span>
      <button class="mi-iconbtn" data-theme-toggle aria-label="Toggle theme">☾</button>
    </div>
    <div class="pf-controls">
      <input id="pf-search" placeholder="Search title, company, role, type… (toggle Full-text to search inside prompts & feedback)">
      <select id="pf-type"><option value="">All types</option></select>
      <select id="pf-role"><option value="">All roles</option></select>
      <select id="pf-status">
        <option value="">Any status</option>
        <option value="not_started">Not started</option>
        <option value="in_progress">In progress</option>
        <option value="ended">Ended (awaiting retro)</option>
        <option value="completed">Completed</option>
      </select>
      <label class="pf-ft" title="Also search the full text of each interview's prompt and feedback">
        <input type="checkbox" id="pf-ft"> Full-text<span class="pf-ft-status" id="pf-ft-status"></span>
      </label>
    </div>
    <div class="pf-tablewrap">
    <table>
      <colgroup>
        <col class="c-interview"><col class="c-company"><col class="c-role">
        <col class="c-status"><col class="c-actions">
      </colgroup>
      <thead><tr>
        <th data-sort="title">Interview</th>
        <th data-sort="company">Company</th>
        <th data-sort="role" title="Role family — hover a row's role for the specific title &amp; level">Role</th>
        <th data-sort="status" title="Hover a row's status for date, attempt &amp; time taken">Status</th>
        <th class="pf-actions-h" aria-label="Actions"></th>
      </tr></thead>
      <tbody id="pf-rows"></tbody>
    </table>
    </div>
    <div class="pf-empty" id="pf-empty" hidden>No interviews match.</div>
    <footer id="pf-foot"></footer>
  </div>
  <script>
    let DATA = [], CANDIDATE = {}, sortKey = "date", sortDir = -1, ftEnabled = false, indexed = false;
    const esc = s => (s ?? "").toString().replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
    fetch("portfolio.json").then(r => r.json()).then(pf => {
      DATA = pf.interviews || [];
      CANDIDATE = pf.candidate || {};
      renderProfile();
      populateFilters();
      const a = pf.attribution || {}, links = a.links || {};
      const parts = [];
      if (a.org) parts.push(`Built with the ${esc(a.org)} Tech Interview methodology`);
      if (links.website) parts.push(`<a href="${esc(links.website)}">${esc(links.website.replace(/^https?:\/\//, ""))}</a>`);
      if (links.github) parts.push(`<a href="${esc(links.github)}">GitHub</a>`);
      parts.push(`<a href="https://claude.com/claude-code">Claude Code</a>`);
      document.getElementById("pf-foot").innerHTML = parts.join(" · ");
      render();   // metadata-only by default; full-text indexing happens lazily when the toggle is enabled
      refreshLiveStatus();                       // reflect live per-interview status, not just the snapshot
      setInterval(refreshLiveStatus, 15000);
    }).catch(() => { document.getElementById("pf-empty").hidden = false;
      document.getElementById("pf-empty").textContent = "Could not load portfolio.json — start the server (python3 shell/serve.py)."; });

    // Neutral metadata tag; "—" when empty. Full value on hover so long values don't blow out the row.
    const tag = (v, title) => v ? `<span class="pf-tag" title="${esc(title || v)}">${esc(v)}</span>` : `<span class="pf-tag muted">—</span>`;

    // ===== Canonical role-category enum (the "base level" hard enum) ==========================
    // The Role column shows the broad FAMILY; the specific job title (e.g. "Staff Backend Engineer")
    // and level (e.g. "E7") live on the interview as `role` + `level` and surface only on hover.
    // Stored on each interview as `role_category` (one of these keys); legacy rows are inferred below.
    const ROLE_CATEGORIES = [
      { key: "swe",       label: "SWE",       full: "Software Engineering" },
      { key: "data-eng",  label: "Data Eng",  full: "Data Engineering" },
      { key: "data-sci",  label: "Data Sci",  full: "Data Science" },
      { key: "ml",        label: "ML",        full: "Machine Learning" },
      { key: "analytics", label: "Analytics", full: "Analytics / BI" },
      { key: "infra",     label: "Infra/SRE", full: "Infrastructure / SRE / DevOps" },
      { key: "security",  label: "Security",  full: "Security" },
      { key: "pm",        label: "Product",   full: "Product Management" },
      { key: "em",        label: "Eng Mgmt",  full: "Engineering Management" },
      { key: "design",    label: "Design",    full: "Design / UX" },
      { key: "qa",        label: "QA",        full: "Quality / SDET" },
      { key: "research",  label: "Research",  full: "Research / Academic" },
      { key: "finance",   label: "Finance",   full: "Finance / Quant" },
      { key: "other",     label: "Other",     full: "Other" },
    ];
    const CAT_BY_KEY = Object.fromEntries(ROLE_CATEGORIES.map(c => [c.key, c]));
    // Resolve an interview's category: explicit `role_category` wins; otherwise infer from role/type/title.
    function catKey(d) {
      if (d.role_category && CAT_BY_KEY[d.role_category]) return d.role_category;
      const hay = `${d.role || ""} ${d.type || ""} ${d.title || ""}`.toLowerCase();
      if (/\bpm\b|product manage|product manager/.test(hay)) return "pm";
      if (/manager|\bem\b|eng lead|leadership/.test(hay)) return "em";
      if (/data eng|\bde\b|pipeline|\betl\b|warehouse/.test(hay)) return "data-eng";
      if (/data scien|\bds\b/.test(hay)) return "data-sci";
      if (/\bml\b|machine learning|mlops|deep learning/.test(hay)) return "ml";
      if (/analyst|analytics|\bbi\b|tableau|looker/.test(hay)) return "analytics";
      if (/\bsre\b|devops|infra|cloud|platform|deploy|kubernetes|terraform/.test(hay)) return "infra";
      if (/security|appsec|pentest|infosec/.test(hay)) return "security";
      if (/design|\bux\b|\bui\b(?!ld)/.test(hay)) return "design";
      if (/\bqa\b|sdet|quality|test eng/.test(hay)) return "qa";
      if (/research|\bphd\b|grad school|academ/.test(hay)) return "research";
      if (/finance|quant|trading|actuar/.test(hay)) return "finance";
      if (/engineer|developer|\bswe\b|coding|frontend|front-end|back ?end|full.?stack|mobile|react|system design|\bsql\b/.test(hay)) return "swe";
      return "other";
    }
    const catLabel = d => (CAT_BY_KEY[catKey(d)] || CAT_BY_KEY.other).label;
    const catFull  = d => (CAT_BY_KEY[catKey(d)] || CAT_BY_KEY.other).full;
    // Cells carry NO native title — a rich key/value popover (see the hover handlers) supplies the detail.
    const roleCell = d => `<span class="pf-tag">${esc(catLabel(d))}</span>`;
    function fmtDur(s) {
      s = Math.round(s || 0); if (s <= 0) return "";
      const m = Math.round(s / 60); return m >= 60 ? `${Math.floor(m / 60)}h ${m % 60}m` : `${m}m`;
    }
    function attemptNum(d) {
      const m = String(d.slug || "").match(/-attempt-(\d+)$/) || String(d.title || "").match(/\(attempt (\d+)\)/i);
      return m ? +m[1] : null;
    }
    // Distil the qualitative `overall` to a short outcome class (pass / borderline / fail), or null if unclear.
    function outcome(overall) {
      const s = (overall || "").toLowerCase();
      if (/\bborderline\b/.test(s)) return "borderline";
      if (/\b(fail|no[ -]?pass|did ?n[o']?t pass|reject)/.test(s)) return "fail";
      if (/\bpass\b/.test(s)) return "pass";
      return null;
    }
    // Status pill — a COMPLETED interview folds its result in (pass / borderline / fail); others show state.
    function statusPill(d) {
      const st = d.status || "not_started";
      if (st === "completed") { const o = outcome(d.overall); return pillNT(o || "completed", o || "completed"); }
      return pillNT(st, st.replace(/_/g, " "));
    }
    const pillNT = (cls, label) => `<span class="pf-pill ${esc(cls)}">${esc(label)}</span>`;

    // ===== Rich hover popovers (styled like the ⋯ menu): bold left label, right-aligned value ==========
    const popRows = pairs => pairs
      .filter(([, v]) => v != null && v !== "")
      .map(([k, v]) => `<div class="pf-pop-row"><span class="pf-pop-k">${esc(k)}</span><span class="pf-pop-v">${esc(v)}</span></div>`)
      .join("");
    const rolePopHTML = d => popRows([["Category", catFull(d)], ["Title", d.role], ["Level", d.level]]);
    function statusPopHTML(d) {
      const st = (d.status || "not_started").replace(/_/g, " ");
      const o = outcome(d.overall);
      return popRows([
        ["Status", st],
        ["Result", o || (d.status === "completed" ? "completed" : null)],
        ["Date", d.date],
        ["Attempt", attemptNum(d)],
        ["Time", fmtDur(d._elapsed)],
      ]);
    }

    function render() {
      const q = document.getElementById("pf-search").value.toLowerCase();
      const ty = document.getElementById("pf-type").value, st = document.getElementById("pf-status").value;
      const ro = document.getElementById("pf-role").value;
      let rows = DATA.filter(d =>
        (!ty || d.type === ty) && (!st || d.status === st) && (!ro || catKey(d) === ro) &&
        [d.title, d.company, d.role, d.type, d.level, catLabel(d), catFull(d), ftEnabled ? d._text : ""].some(v => (v || "").toString().toLowerCase().includes(q)));
      rows.sort((a, b) => ((a[sortKey] || "") > (b[sortKey] || "") ? 1 : -1) * sortDir);
      const tb = document.getElementById("pf-rows");
      tb.innerHTML = rows.map(d => `<tr>
        <td><a class="pf-open" href="${esc(d.slug)}/interview.html" title="${esc(d.title || d.slug)}">${esc(d.title || d.slug)}</a></td>
        <td>${tag(d.company)}</td>
        <td class="pf-pop-cell" data-pop="role" data-slug="${esc(d.slug)}">${roleCell(d)}</td>
        <td class="pf-pop-cell" data-pop="status" data-slug="${esc(d.slug)}">${statusPill(d)}</td>
        <td class="pf-actions">
          <button class="pf-act pf-more" data-act="menu" data-slug="${esc(d.slug)}" title="More actions"
            aria-label="Actions for ${esc(d.title || d.slug)}" aria-haspopup="menu" aria-expanded="false">⋯</button>
        </td></tr>`).join("");
      document.getElementById("pf-empty").hidden = rows.length > 0;
    }
    // Build the Type and Role filter dropdowns from the data (called on load and after mutations).
    function populateFilters() {
      // Type: free-form values present in the data.
      const tSel = document.getElementById("pf-type"), tCur = tSel.value;
      const tVals = [...new Set(DATA.map(d => d.type).filter(Boolean))].sort();
      tSel.innerHTML = `<option value="">All types</option>` +
        tVals.map(v => `<option value="${esc(v)}">${esc(v)}</option>`).join("");
      tSel.value = tVals.includes(tCur) ? tCur : "";
      // Role: the canonical category enum, limited to categories actually present (value = key, label = full).
      const rSel = document.getElementById("pf-role"), rCur = rSel.value;
      const present = new Set(DATA.map(catKey));
      const cats = ROLE_CATEGORIES.filter(c => present.has(c.key));
      rSel.innerHTML = `<option value="">All roles</option>` +
        cats.map(c => `<option value="${esc(c.key)}">${esc(c.full)}</option>`).join("");
      rSel.value = present.has(rCur) ? rCur : "";
    }
    // Override the portfolio.json snapshot with each interview's live state: interview.json (status/overall,
    // written by the interviewer at the Retro) and artifacts/_session.json (ended / time elapsed in the UI).
    async function refreshLiveStatus() {
      await Promise.all(DATA.map(async d => {
        const slug = encodeURIComponent(d.slug);
        try {
          const r = await fetch(`${slug}/interview.json`, { cache: "no-store" });
          if (r.ok) { const j = await r.json();
            if (j.status) d.status = j.status;
            if (j.overall != null) d.overall = j.overall;
            if (j.role_category) d.role_category = j.role_category;
            if (j.role) d.role = j.role; if (j.level) d.level = j.level; }
        } catch (e) {}
        try {   // _session has the elapsed time (for the Status tooltip) and the live ended/in-progress state
          const s = await fetch(`${slug}/artifacts/_session.json`, { cache: "no-store" });
          if (s.ok) { const sj = await s.json();
            if (sj.elapsed_seconds > 0) d._elapsed = sj.elapsed_seconds;
            if (d.status !== "completed") {
              if (sj.ended) d.status = "ended";
              else if ((sj.elapsed_seconds || 0) > 0 && d.status === "not_started") d.status = "in_progress"; } }
        } catch (e) {}
      }));
      render();
    }
    async function indexContent() {
      // Pull each interview's prompt + feedback so search matches a specific phrase, not just metadata.
      await Promise.all(DATA.map(async d => {
        let txt = "";
        for (const f of ["prompt.md", "feedback.md"]) {
          try { const r = await fetch(`${encodeURIComponent(d.slug)}/${f}`); if (r.ok) txt += " " + await r.text(); } catch (e) {}
        }
        d._text = txt.toLowerCase();
      }));
      render();
    }
    document.querySelectorAll("[data-sort]").forEach(th => th.onclick = () => {
      const k = th.dataset.sort; sortDir = (sortKey === k) ? -sortDir : 1; sortKey = k; render();
    });
    ["pf-search", "pf-type", "pf-status", "pf-role"].forEach(id => document.getElementById(id).addEventListener("input", render));
    document.getElementById("pf-ft").addEventListener("change", async e => {
      ftEnabled = e.target.checked;
      if (ftEnabled && !indexed) {                 // fetch prompt/feedback text only on first enable
        indexed = true;
        document.getElementById("pf-ft-status").textContent = " (indexing…)";
        await indexContent();
        document.getElementById("pf-ft-status").textContent = "";
      }
      render();
    });

    // ===== candidate profile + per-interview management ============================
    // All mutations go through the local server (filesystem ops); they no-op gracefully if it's
    // offline, since editing files on disk requires it.
    function renderProfile() {
      // Deliberately no candidate-level here — levels live on the interviews, not on the person.
      const bits = [CANDIDATE.name || "", `${DATA.length} interviews`].filter(Boolean);
      document.getElementById("pf-who").textContent = bits.join(" · ");
      const links = [];
      if (CANDIDATE.github) {
        const h = String(CANDIDATE.github);
        const url = /^https?:\/\//.test(h) ? h : `https://github.com/${h}`;
        links.push(`<a href="${esc(url)}" target="_blank" rel="noopener">GitHub</a>`);
      }
      if (CANDIDATE.linkedin) {
        const l = String(CANDIDATE.linkedin);
        const url = /^https?:\/\//.test(l) ? l : `https://www.linkedin.com/in/${l}`;
        links.push(`<a href="${esc(url)}" target="_blank" rel="noopener">LinkedIn</a>`);
      }
      document.getElementById("pf-links").innerHTML = links.join("");
      document.getElementById("pf-editprofile").hidden = false;
    }

    async function api(path, body) {
      let r;
      try { r = await fetch(path, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) }); }
      catch (e) { throw new Error("can't reach the local server — start it with: python3 shell/serve.py"); }
      const j = await r.json().catch(() => ({}));
      if (!r.ok || j.error) throw new Error(j.error || ("HTTP " + r.status));
      return j;
    }
    function toast(msg) {
      const t = document.createElement("div"); t.className = "pf-toast"; t.textContent = msg;
      document.body.appendChild(t); setTimeout(() => t.remove(), 2600);
    }
    // A reset/delete also clears the browser's localStorage mirror for that interview, so stale work
    // (kept under mi:/<slug>/… and mi:phases:/<slug>/) doesn't reappear on the next open.
    function clearLocalState(slug) {
      const a = `mi:/${slug}/`, b = `mi:phases:/${slug}/`;
      for (let i = localStorage.length - 1; i >= 0; i--) {
        const k = localStorage.key(i);
        if (k && (k.startsWith(a) || k.startsWith(b))) localStorage.removeItem(k);
      }
    }
    async function reload() {
      try { const pf = await (await fetch("portfolio.json", { cache: "no-store" })).json();
        DATA = pf.interviews || []; CANDIDATE = pf.candidate || CANDIDATE; } catch (e) {}
      renderProfile(); populateFilters(); render(); refreshLiveStatus();
      if (ftEnabled) { indexed = true; indexContent(); }
    }

    function modal(inner) {
      const o = document.createElement("div"); o.className = "pf-overlay";
      o.innerHTML = `<div class="pf-modal" role="dialog" aria-modal="true">${inner}</div>`;
      const close = () => { o.remove(); document.removeEventListener("keydown", onKey); };
      function onKey(e) { if (e.key === "Escape") close(); }
      o.addEventListener("click", e => { if (e.target === o) close(); });
      document.addEventListener("keydown", onKey);
      document.body.appendChild(o);
      o.close = close;
      return o;
    }

    function suggestAttempt(d) {
      const baseSlug = d.slug.replace(/-attempt-\d+$/, "");
      const n = DATA.filter(x => x.slug === baseSlug || x.slug.startsWith(baseSlug + "-attempt-")).length + 1;
      const baseTitle = (d.title || d.slug).replace(/\s*\(attempt \d+\)\s*$/, "");
      return `${baseTitle} (attempt ${n})`;
    }

    function openEdit(d) {
      const opts = [["not_started", "not started"], ["in_progress", "in progress"],
        ["completed", "completed"], ["ended", "ended (awaiting retro — usually automatic)"]];
      const o = modal(`
        <h2>Edit interview</h2>
        <div class="pf-field"><label>Title</label><input id="m-title" value="${esc(d.title || "")}"></div>
        <div class="pf-field"><label>Role family</label><select id="m-role-cat">${
          ROLE_CATEGORIES.map(c => `<option value="${c.key}" ${catKey(d) === c.key ? "selected" : ""}>${esc(c.full)}</option>`).join("")}</select></div>
        <div class="pf-field"><label>Specific title</label><input id="m-role" value="${esc(d.role || "")}" placeholder="e.g. Staff Backend Engineer"></div>
        <div class="pf-field"><label>Level</label><input id="m-level" value="${esc(d.level || "")}" placeholder="e.g. E7 / senior / mid"></div>
        <div class="pf-field"><label>Type</label><input id="m-type" value="${esc(d.type || "")}" list="m-types"></div>
        <p class="pf-note warn">Changing type switches which UI module loads; existing work may not match a different type.</p>
        <div class="pf-field"><label>Company</label><input id="m-company" value="${esc(d.company || "")}"></div>
        <div class="pf-field"><label>Date</label><input id="m-date" type="date" value="${esc(d.date || "")}"></div>
        <div class="pf-field"><label>Status</label><select id="m-status">${
          opts.map(([v, t]) => `<option value="${v}" ${d.status === v ? "selected" : ""}>${t}</option>`).join("")}</select></div>
        <div class="pf-field"><label>Result</label><input id="m-overall" value="${esc(d.overall || "")}"></div>
        <datalist id="m-types">${[...new Set(DATA.map(x => x.type).filter(Boolean))].map(t => `<option value="${esc(t)}">`).join("")}</datalist>
        <div class="pf-modal-foot"><button class="pf-act" id="m-cancel">Cancel</button><button class="mi-btn primary" id="m-save">Save</button></div>`);
      const v = id => o.querySelector("#" + id).value.trim();
      o.querySelector("#m-cancel").onclick = o.close;
      o.querySelector("#m-save").onclick = async () => {
        if (!v("m-type")) { alert("Type can't be empty."); return; }
        const patch = { title: v("m-title"), role_category: o.querySelector("#m-role-cat").value,
          role: v("m-role") || null, type: v("m-type"),
          company: v("m-company") || null, level: v("m-level") || null, date: v("m-date") || null,
          status: o.querySelector("#m-status").value, overall: v("m-overall") || null };
        try { await api("/api/meta", { slug: d.slug, patch }); o.close(); toast("Saved"); reload(); }
        catch (e) { alert("Save failed: " + e.message); }
      };
      o.querySelector("#m-title").focus();
    }

    function openClone(d) {
      const o = modal(`
        <h2>Clone as a new attempt</h2>
        <p class="pf-note">Creates a fresh copy — same problem, tests and settings — with empty work,
          transcript and feedback, so you can track another attempt separately. The original is untouched.</p>
        <div class="pf-field"><label>New title</label><input id="c-title" value="${esc(suggestAttempt(d))}"></div>
        <div class="pf-modal-foot"><button class="pf-act" id="c-cancel">Cancel</button><button class="mi-btn primary" id="c-go">Clone</button></div>`);
      o.querySelector("#c-cancel").onclick = o.close;
      o.querySelector("#c-go").onclick = async () => {
        try { const j = await api("/api/clone", { slug: d.slug, new_title: o.querySelector("#c-title").value.trim() || undefined });
          o.close(); toast("Cloned → " + j.slug); reload(); }
        catch (e) { alert("Clone failed: " + e.message); }
      };
      o.querySelector("#c-title").focus();
    }

    function openProfile() {
      const o = modal(`
        <h2>Edit your profile</h2>
        <div class="pf-field"><label>Name</label><input id="p-name" value="${esc(CANDIDATE.name || "")}"></div>
        <div class="pf-field"><label>GitHub</label><input id="p-github" value="${esc(CANDIDATE.github || "")}" placeholder="username or full URL"></div>
        <div class="pf-field"><label>LinkedIn</label><input id="p-linkedin" value="${esc(CANDIDATE.linkedin || "")}" placeholder="vanity name or full URL"></div>
        <p class="pf-note">GitHub also credits any interviews you contribute back to the community.</p>
        <div class="pf-modal-foot"><button class="pf-act" id="p-cancel">Cancel</button><button class="mi-btn primary" id="p-save">Save</button></div>`);
      const v = id => o.querySelector("#" + id).value.trim();
      o.querySelector("#p-cancel").onclick = o.close;
      o.querySelector("#p-save").onclick = async () => {
        const patch = { name: v("p-name"), github: v("p-github") || null, linkedin: v("p-linkedin") || null };
        try { const j = await api("/api/profile", { patch }); CANDIDATE = j.candidate || CANDIDATE; o.close(); toast("Profile saved"); renderProfile(); }
        catch (e) { alert("Save failed: " + e.message); }
      };
      o.querySelector("#p-name").focus();
    }
    document.getElementById("pf-editprofile").onclick = openProfile;

    // Run a chosen row action. Shared by the dropdown menu items.
    async function runRowAction(act, d) {
      const slug = d.slug, label = d.title || slug;
      try {
        if (act === "edit") return openEdit(d);
        if (act === "clone") return openClone(d);
        if (act === "reset") {
          if (!confirm(`Reset "${label}"?\n\nThis wipes the code, notes, transcript and feedback for this interview and returns it to a fresh, unstarted state. The problem, tests and settings are kept.`)) return;
          await api("/api/reset", { slug }); clearLocalState(slug); toast("Interview reset"); reload();
        } else if (act === "delete") {
          if (!confirm(`Delete "${label}"?\n\nThis permanently removes the entire interview folder and all of its work. This cannot be undone.`)) return;
          if (!confirm(`Really delete "${label}"? Last chance.`)) return;
          await api("/api/delete", { slug }); clearLocalState(slug); toast("Interview deleted"); reload();
        }
      } catch (err) { alert("Action failed: " + err.message); }
    }

    // The ⋯ dropdown: one floating menu at a time, positioned next to its anchor button.
    let CURRENT_MENU = null;
    function closeRowMenu() {
      if (!CURRENT_MENU) return;
      CURRENT_MENU.anchor?.setAttribute("aria-expanded", "false");
      CURRENT_MENU.el.remove();
      CURRENT_MENU = null;
    }
    function openRowMenu(anchor, d) {
      closeRowMenu();
      const el = document.createElement("div");
      el.className = "pf-menu"; el.setAttribute("role", "menu");
      el.innerHTML = `
        <button role="menuitem" data-mact="edit"><span class="pf-mi">✎</span>Edit metadata</button>
        <button role="menuitem" data-mact="clone"><span class="pf-mi">⧉</span>Clone as new attempt</button>
        <button role="menuitem" data-mact="reset"><span class="pf-mi">↺</span>Reset to fresh state</button>
        <div class="pf-menu-sep"></div>
        <button role="menuitem" class="danger" data-mact="delete"><span class="pf-mi">🗑</span>Delete interview</button>`;
      el.addEventListener("click", e => {
        const b = e.target.closest("[data-mact]"); if (!b) return;
        const act = b.dataset.mact; closeRowMenu(); runRowAction(act, d);
      });
      document.body.appendChild(el);
      // Position: right-align the menu to the button, drop below; flip up / clamp to stay on-screen.
      const r = anchor.getBoundingClientRect(), mw = el.offsetWidth, mh = el.offsetHeight;
      let left = Math.min(r.right - mw, innerWidth - mw - 8);
      let top = (r.bottom + mh + 8 > innerHeight) ? r.top - mh - 4 : r.bottom + 4;
      el.style.left = Math.max(8, left) + "px";
      el.style.top = Math.max(8, top) + "px";
      anchor.setAttribute("aria-expanded", "true");
      CURRENT_MENU = { el, anchor };
      el.querySelector("button").focus();
    }
    // Delegated trigger for every row's ⋯ button (rows are re-rendered, so don't bind per-row).
    document.getElementById("pf-rows").addEventListener("click", e => {
      const btn = e.target.closest('[data-act="menu"]'); if (!btn) return;
      e.stopPropagation();
      if (CURRENT_MENU && CURRENT_MENU.anchor === btn) { closeRowMenu(); return; }  // toggle off
      const d = DATA.find(x => x.slug === btn.dataset.slug) || { slug: btn.dataset.slug };
      openRowMenu(btn, d);
    });
    // Dismiss the menu on outside click, Escape, scroll, or resize.
    document.addEventListener("click", e => { if (CURRENT_MENU && !e.target.closest(".pf-menu")) closeRowMenu(); });
    document.addEventListener("keydown", e => { if (e.key === "Escape") closeRowMenu(); });
    window.addEventListener("resize", closeRowMenu);
    window.addEventListener("scroll", closeRowMenu, true);

    // ===== Role / Status hover popover ============================================
    let POP = null;
    function hidePop() { if (POP) { POP.remove(); POP = null; } }
    function showPop(cell) {
      const d = DATA.find(x => x.slug === cell.dataset.slug); if (!d) return;
      const html = cell.dataset.pop === "role" ? rolePopHTML(d) : statusPopHTML(d);
      if (!html) return;
      hidePop();
      const el = document.createElement("div"); el.className = "pf-pop"; el.innerHTML = html;
      el._cell = cell; document.body.appendChild(el);
      const r = cell.getBoundingClientRect(), pw = el.offsetWidth, ph = el.offsetHeight;
      let left = Math.min(r.left, innerWidth - pw - 8);
      let top = (r.bottom + ph + 6 > innerHeight) ? r.top - ph - 6 : r.bottom + 6;
      el.style.left = Math.max(8, left) + "px";
      el.style.top = Math.max(8, top) + "px";
      POP = el;
    }
    const rowsEl = document.getElementById("pf-rows");
    rowsEl.addEventListener("mouseover", e => {
      const cell = e.target.closest(".pf-pop-cell");
      if (!cell) { if (POP) hidePop(); return; }
      if (POP && POP._cell === cell) return;
      showPop(cell);
    });
    rowsEl.addEventListener("mouseout", e => {
      const cell = e.target.closest(".pf-pop-cell");
      if (cell && !cell.contains(e.relatedTarget)) hidePop();
    });
    window.addEventListener("scroll", hidePop, true);
    window.addEventListener("resize", hidePop);
  </script>
</body>
</html>
